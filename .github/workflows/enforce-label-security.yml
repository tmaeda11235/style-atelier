name: Enforce Label Security (Anti-Injection)

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  enforce-ready-for-dev:
    runs-on: ubuntu-latest
    if: "github.event.label.name == 'status: ready-for-dev'"
    steps:
      - name: Verify Actor Permission
        # Replace 'tmaeda11235' with an array check if multiple admins exist, 
        # but for now, hardcode the trusted repository owner/agent account.
        if: github.actor != 'tmaeda11235'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const actor = context.actor;

            console.log(`Unauthorized label application detected by: ${actor}`);

            // Remove the label
            await github.rest.issues.removeLabel({
              owner: owner,
              repo: repo,
              issue_number: issue_number,
              name: 'status: ready-for-dev'
            });

            // Post a warning comment
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issue_number,
              body: `⚠️ **Security Alert: Issue Injection Blocked**\n\n@${actor}, you do not have permission to apply the \`status: ready-for-dev\` label. This label is restricted to the Gatekeeper agent and repository administrators to prevent unauthorized code execution. The label has been automatically removed.`
            });
