name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'memory-bank/**'
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------
  # Job 1: 爆速の証明検証（npm install不要）
  # ---------------------------------------------------
  verify-proof:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.verify.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify Proof of Work
        id: verify
        env:
          PRIVATE_KEY: ${{ secrets.INCREMENTAL_TEST_PRIVATE_KEY }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Fetch notes
          git fetch origin refs/notes/commits:refs/notes/commits || true
          
          mkdir -p artifacts
          
          # Try to get proof from git notes on the PR HEAD commit
          if git notes show "$PR_HEAD_SHA" > artifacts/test-proof.enc 2>/dev/null; then
            echo "Found test proof in git notes."
          elif [ -f artifacts/test-proof.enc ]; then
            echo "Found test proof in file (fallback)."
          else
            echo "No test proof found."
          fi
          
          if [ -s artifacts/test-proof.enc ]; then
            node scripts/verify-test-proof.mjs && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

  # ---------------------------------------------------
  # Job 2: ユニットテストとビルド（CPU・メモリ重視）
  # ---------------------------------------------------
  unit-and-build:
    needs: [verify-proof]
    if: needs.verify-proof.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cancel Workflow on Failure
        if: failure()
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint
        run: npm run lint

      - name: Verify ESLint exception list is synchronized
        run: |
          node scripts/auto-sync-eslint.js
          git diff --exit-code eslint.config.mjs

      - name: Fetch base branch for verification
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Verify ESLint Whitelist has not grown
        run: node scripts/check-eslint-whitelist.js eslint.config.mjs ${{ github.base_ref }}

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Report Coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: './coverage/coverage-summary.json'
          json-final-path: './coverage/coverage-final.json'

      - name: Build extension
        run: npm run build

  # ---------------------------------------------------
  # Job 3: E2Eテスト（ネットワーク・プロセッサ分離）
  # ---------------------------------------------------
  e2e-test:
    needs: [verify-proof]
    if: needs.verify-proof.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cancel Workflow on Failure
        if: failure()
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      # PlaywrightのバージョンとOSのみをキーとし、確実なキャッシュヒットを狙う
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      # キャッシュミス時: ブラウザバイナリとOS依存ライブラリの両方をダウンロード
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # キャッシュヒット時: ブラウザのDLはスキップし、Ubuntu側のOS依存ライブラリのみインストール
      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Build extension for manifest tests
        run: npm run build

      - name: Build mobile PWA app
        run: npm run build:mobile

      - name: Monitor System Resources
        run: |
          bash -c 'while true; do date; echo "=== RAM ==="; free -m; echo "=== CPU ==="; top -b -n 1 | head -n 15; echo "-------------------"; sleep 5; done' > system_metrics.log &

      - name: Run E2E tests
        run: xvfb-run npm run test:e2e -- --reporter=html

      - name: Upload System Metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-metrics
          path: system_metrics.log
          retention-days: 7

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30